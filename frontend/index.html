<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ============================================================
         Astravon Live Arena
         Intelligent Crowd Monitoring Platform
         House of Astravon
    ============================================================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Astravon Live Arena - AI Powered Crowd Intelligence Platform"
    >

    <meta
        name="theme-color"
        content="#0d1117"
    >

    <title>
        Astravon Live Arena
    </title>

    <!-- ============================================================
         Fonts
    ============================================================= -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- ============================================================
         Icons
    ============================================================= -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css"
    >

    <!-- ============================================================
         Leaflet
    ============================================================= -->

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

    <!-- ============================================================
     CSS
    ============================================================ -->

    <!-- Design System -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Layout -->
    <link rel="stylesheet" href="css/layout.css">

    <!-- Dashboard Modules -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/monitoring.css">
    <link rel="stylesheet" href="css/management.css">
    <link rel="stylesheet" href="css/pages.css">
    

    <!-- Responsive (Always Last) -->
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<!-- ============================================================
     Splash Screen
============================================================= -->

<div id="loadingScreen">

    <div class="loader-container">

        <div class="loader-logo">

            ASTRAVON

        </div>

        <div class="loader-subtitle">

            Live Arena

        </div>

        <div class="loader-progress">

            <div id="loadingBar"></div>

        </div>

        <div class="loader-status">

            Initializing AI Systems...

        </div>

    </div>

</div>

<!-- ============================================================
     Application
============================================================= -->

<div id="app">

    <!-- =======================================================
         Navigation
    ======================================================== -->

    <header id="navbar"></header>

    <!-- =======================================================
         Workspace
    ======================================================== -->

    <div class="layout">

        <aside id="sidebar"></aside>

        <main id="mainContent">

            <!-- Dynamic pages injected here -->

        </main>

    </div>

    <!-- =======================================================
         Footer
    ======================================================== -->

    <footer id="footer"></footer>

</div>

<!-- ============================================================
     Global Status Bar
============================================================= -->

<div id="systemStatusBar">

    <div class="status-item">

        <span class="status-label">

            Backend

        </span>

        <span
            id="backendStatus"
            class="status-indicator offline"
        >
            Offline
        </span>

    </div>

    <div class="status-item">

        <span class="status-label">

            WebSocket

        </span>

        <span
            id="socketStatus"
            class="status-indicator offline"
        >
            Disconnected
        </span>

    </div>

    <div class="status-item">

        <span class="status-label">

            AI Engine

        </span>

        <span
            id="engineStatus"
            class="status-indicator offline"
        >
            Stopped
        </span>

    </div>

    <div class="status-item">

        <span class="status-label">

            Cameras

        </span>

        <span id="cameraCount">

            0

        </span>

    </div>

    <div class="status-item">

        <span class="status-label">

            FPS

        </span>

        <span id="globalFPS">

            --

        </span>

    </div>

</div>

<!-- ============================================================
     Notifications
============================================================= -->

<div id="toastContainer"></div>

<!-- ============================================================
     Modal System
============================================================= -->

<div
    id="modalOverlay"
    class="hidden"
>

    <div id="modalWindow">

        <div id="modalContent"></div>

    </div>

</div>

<!-- ============================================================
     Fullscreen Loading Overlay
============================================================= -->

<div
    id="processingOverlay"
    class="hidden"
>

    <div class="processing-box">

        <div class="spinner"></div>

        <h2>

            Processing...

        </h2>

    </div>

</div>

<!-- ============================================================
     Emergency Banner
============================================================= -->

<div
    id="emergencyBanner"
    class="hidden"
>

    <span id="emergencyMessage">

        Emergency Alert

    </span>

</div>

<!-- ============================================================
     Scripts
============================================================= -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

============================================================= -->

<script type="module" src="components/cameras/camera_grid.js"></script>

<script type="module" src="components/cameras/camera_toolbar.js"></script>
<script type="module" src="components/cameras/fullscreen.js"></script>

<!-- ============================================================

============================================================= -->

<script type="module" src="components/analytics/statistics.js"></script>

============================================================= -->

<script type="module" src="components/risk/evacuation.js"></script>

<!-- ============================================================
     Application Entry
============================================================= -->

<script type="module" src="js/app.js"></script>

</body>

</html>
