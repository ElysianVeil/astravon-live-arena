<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ======================================================
         Astravon Live Arena
         Reports
    ======================================================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Astravon Live Arena | Reports

    </title>

    <!-- ======================================================
         Fonts
    ======================================================= -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    >

    <!-- ======================================================
         Stylesheets
    ======================================================= -->

    <!-- <link
        rel="stylesheet"
        href="../css/variables.css"
    >

    <link
        rel="stylesheet"
        href="../css/layout.css"
    >

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

    <link
        rel="stylesheet"
        href="../css/components.css"
    >

    <link
        rel="stylesheet"
        href="../css/responsive.css"
    > -->

</head>

<body>

    <div class="dashboard-layout">

        <!-- ===============================================
             Sidebar
        ================================================ -->

        <aside

            id="sidebar"

            class="sidebar"

        ></aside>

        <!-- ===============================================
             Main Content
        ================================================ -->

        <main class="main-content">

            <!-- Navbar -->

            <header

                id="navbar"

                class="navbar"

            ></header>

            <!-- ===========================================
                 Page Header
            ============================================ -->

            <section class="page-header">

                <h1>

                    📊 Reports & Analytics

                </h1>

                <p>

                    Historical AI statistics, trends,
                    crowd analytics, and event summaries.

                </p>

            </section>

            <!-- ===========================================
                 Reports Grid
            ============================================ -->

            <section class="dashboard-grid">

                <!-- Crowd History -->

                <section class="dashboard-card">

                    <div class="card-header">

                        <h2>

                            Crowd History

                        </h2>

                    </div>

                    <canvas

                        id="crowdHistoryChart"

                    ></canvas>

                </section>

                <!-- Temperature History -->

                <section class="dashboard-card">

                    <div class="card-header">

                        <h2>

                            Temperature History

                        </h2>

                    </div>

                    <canvas

                        id="temperatureChart"

                    ></canvas>

                </section>

                <!-- Risk Analysis -->

                <section class="dashboard-card">

                    <div class="card-header">

                        <h2>

                            Risk Analysis

                        </h2>

                    </div>

                    <canvas

                        id="riskChart"

                    ></canvas>

                </section>

                <!-- Event Summary -->

                <section class="dashboard-card">

                    <div class="card-header">

                        <h2>

                            Event Summary

                        </h2>

                    </div>

                    <table class="report-table">

                        <thead>

                            <tr>

                                <th>

                                    Metric

                                </th>

                                <th>

                                    Value

                                </th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td>

                                    Highest Crowd

                                </td>

                                <td id="highestPeople">

                                    --

                                </td>

                            </tr>

                            <tr>

                                <td>

                                    Average Occupancy

                                </td>

                                <td id="averageOccupancy">

                                    --

                                </td>

                            </tr>

                            <tr>

                                <td>

                                    Highest Temperature

                                </td>

                                <td id="highestTemperature">

                                    --

                                </td>

                            </tr>

                            <tr>

                                <td>

                                    Maximum Risk

                                </td>

                                <td id="highestRisk">

                                    --

                                </td>

                            </tr>

                            <tr>

                                <td>

                                    Total Alerts

                                </td>

                                <td id="totalAlerts">

                                    --

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </section>

                <!-- Export -->

                <section class="dashboard-card">

                    <div class="card-header">

                        <h2>

                            Export Reports

                        </h2>

                    </div>

                    <div class="button-group">

                        <button id="exportPDF">

                            📄 Export PDF

                        </button>

                        <button id="exportCSV">

                            📑 Export CSV

                        </button>

                        <button id="refreshReports">

                            🔄 Refresh

                        </button>

                    </div>

                </section>

            </section>

            <!-- Footer -->

            <footer

                id="footer"

                class="footer"

            ></footer>

        </main>

    </div>

    <!-- ======================================================
         Libraries
    ======================================================= -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ======================================================
         Application
    ======================================================= -->

    <script

        type="module"

        src="../js/app.js"

    ></script>

</body>

</html>
