<main class="analytics-page">

    <!-- ===================================================== -->
    <!-- Analytics Overview -->
    <!-- ===================================================== -->

    <section class="analytics-overview">

        <div
            id="analyticsPeopleCard"
            class="analytics-overview-card"
        ></div>

        <div
            id="analyticsDensityCard"
            class="analytics-overview-card"
        ></div>

        <div
            id="analyticsRiskCard"
            class="analytics-overview-card"
        ></div>

        <div
            id="analyticsPerformanceCard"
            class="analytics-overview-card"
        ></div>

    </section>

    <!-- ===================================================== -->
    <!-- Main Analytics Grid -->
    <!-- ===================================================== -->

    <section class="analytics-grid">

        <!-- ============================================= -->
        <!-- Crowd Trends -->
        <!-- ============================================= -->

        <section
            id="crowdTrendPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Crowd Trends</h2>

                <span class="card-status">
                    Live
                </span>

            </div>

            <canvas id="crowdTrendChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Crowd Density -->
        <!-- ============================================= -->

        <section
            id="densityPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Crowd Density</h2>

            </div>

            <canvas id="densityChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Occupancy -->
        <!-- ============================================= -->

        <section
            id="occupancyPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Venue Occupancy</h2>

            </div>

            <canvas id="occupancyChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Risk -->
        <!-- ============================================= -->

        <section
            id="riskTrendPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Risk Trend</h2>

            </div>

            <canvas id="riskChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Movement -->
        <!-- ============================================= -->

        <section
            id="movementPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Movement Analysis</h2>

            </div>

            <canvas id="movementChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Congestion -->
        <!-- ============================================= -->

        <section
            id="congestionPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Congestion Analysis</h2>

            </div>

            <canvas id="congestionChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Weather -->
        <!-- ============================================= -->

        <section
            id="weatherAnalyticsPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Environmental Conditions</h2>

            </div>

            <canvas id="temperatureChart"></canvas>

            <canvas id="humidityChart"></canvas>

            <canvas id="heatIndexChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- AI Performance -->
        <!-- ============================================= -->

        <section
            id="performancePanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>AI Performance</h2>

            </div>

            <canvas id="fpsChart"></canvas>

            <canvas id="processingTimeChart"></canvas>

            <canvas id="detectionTimeChart"></canvas>

            <canvas id="trackingTimeChart"></canvas>

            <canvas id="reidTimeChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Detection Distribution -->
        <!-- ============================================= -->

        <section
            id="objectDistributionPanel"
            class="dashboard-card analytics-card"
        >

            <div class="card-header">

                <h2>Object Distribution</h2>

            </div>

            <canvas id="objectDistributionChart"></canvas>

        </section>

        <!-- ============================================= -->
        <!-- Analytics Summary -->
        <!-- ============================================= -->

        <section
            id="analyticsSummaryPanel"
            class="dashboard-card analytics-card analytics-summary"
        >

            <div class="card-header">

                <h2>Analytics Summary</h2>

            </div>

            <div id="analyticsSummaryContainer"></div>

        </section>

    </section>

</main>
